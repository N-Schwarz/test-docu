# .readthedocs.yaml
version: 2

# Build configuration
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Sphinx configuration
sphinx:
  configuration: docs/source/conf.py

# Python environment setup
python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt

# Optional: formats to build
formats:
  - htmlzip
  - pdf
